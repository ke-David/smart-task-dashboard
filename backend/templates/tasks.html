<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Task Dashboard</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styleTasks.css') }}">
</head>
<body>

    <div id="app-root">
        <h1>Smart Task Dashboard</h1>

        <!-- <label class="toggle">
            <input type="checkbox" id="celebration-toggle" checked>
                🎉 Celebrations Enabled
        </label> -->

        <div class="settings-row">
            <label class="switch">
                <input type="checkbox" id="celebration-toggle" checked>
                <span class="slider"></span>
            </label>
            <span class="toggle-label">Celebrations</span>
        </div>

        <!-- form -->
        <form id="task-form">
            <input type="text" id="task-input" placeholder="Enter a task" required>
            <select id="category-select">
                <option value="work">Work</option>
                <option value="personal">Personal</option>
                <option value="other">Other</option>
            </select>
            <button type="submit" id="submit-btn" disabled>Add Task</button>
        </form>

        <ul id="task-list"></ul>

        
    </div>

    <div id="overlay-root">
        <!-- celebration -->
        <div id="celebration-banner" class="hidden">
        🎉 TASK COMPLETED! YOU ABSOLUTE MACHINE 🔥
        </div>
        
        <!-- meme -->
        <!-- <img id="meme-overlay" class="hidden" src="pictures/dicaprio.png" /> -->
        <img id="meme-overlay"
            class="hidden"
            src="{{ url_for('static', filename='pictures/dicaprio.png') }}" />
    </div>


    <!-- <script src="script.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- <script type="module" src="script.js"></script> -->
    <script type="module" src="{{ url_for('static', filename='tasks.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
